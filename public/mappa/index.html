<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mappa · Calcaterra Casa</title>
<meta name="description" content="La struttura del sito calcaterra.casa.">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🗺️</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&family=Lato:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#FBFBFA; --paper:#FFFFFF; --ink:#14261C; --body:#4B4F58; --muted:#8A8D86;
    --line:#E7E6DF; --green:#1BAE70; --green-d:#06752E;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);
    font-family:Lato,system-ui,sans-serif;-webkit-font-smoothing:antialiased}
  a{color:inherit;text-decoration:none}
  .wrap{max-width:900px;margin:0 auto;padding:30px 24px 80px}
  .back{font-size:.82rem;letter-spacing:.03em;color:var(--muted);font-weight:700}
  .back:hover{color:var(--ink)}
  .kicker{font-family:Poppins,sans-serif;font-size:.72rem;font-weight:600;letter-spacing:.24em;
    text-transform:uppercase;color:var(--green-d)}
  h1{font-family:Poppins,sans-serif;font-weight:700;font-size:clamp(2.2rem,6vw,3.4rem);
    margin:.2em 0 40px;letter-spacing:-.02em}

  .tree{display:flex;flex-direction:column;align-items:center}
  .root{font-family:Poppins,sans-serif;font-weight:600;background:var(--ink);color:#fff;
    padding:12px 24px;border-radius:12px;font-size:1rem}
  .stem{width:1px;height:34px;background:var(--line)}
  .cols{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:18px;width:100%}

  .node{position:relative;background:var(--paper);border:1px solid var(--line);border-radius:16px;
    padding:16px;box-shadow:0 10px 26px -18px rgba(20,38,28,.4);transition:transform .2s,box-shadow .2s}
  .node:hover{transform:translateY(-4px);box-shadow:0 18px 34px -18px rgba(20,38,28,.45)}
  .node::before{content:"";position:absolute;top:-34px;left:50%;width:1px;height:34px;background:var(--line)}
  .head{display:flex;align-items:center;gap:14px}
  .thumb{width:52px;height:52px;border-radius:11px;object-fit:cover;flex-shrink:0;background:#eee}
  .head .t{font-family:Poppins,sans-serif;font-weight:600;font-size:1.2rem}
  .head .u{color:var(--muted);font-size:.8rem;margin-top:1px}
  .kids{margin-top:14px;display:flex;flex-direction:column;gap:8px}
  .kid{display:flex;align-items:center;gap:11px;padding:7px;border-radius:11px;transition:background .18s}
  .kid:hover{background:var(--bg)}
  .kid .kthumb{width:40px;height:40px;border-radius:9px;object-fit:cover;flex-shrink:0}
  .kid .kt{flex:1;font-weight:700;font-size:.92rem}
  .kid .kd{color:var(--muted);font-size:.76rem;font-weight:400}
  .loading{color:var(--muted);text-align:center}
</style>
</head>
<body>
  <div class="wrap">
    <a class="back" href="/">← Home</a>
    <div style="margin-top:36px" class="kicker">Struttura</div>
    <h1>Mappa del sito</h1>
    <div class="tree">
      <div class="root">calcaterra.casa</div>
      <div class="stem"></div>
      <div class="cols" id="cols"><p class="loading">…</p></div>
    </div>
  </div>

<script>
function node(p){
  const kids=(p.children||[]).map(c=>`
    <a class="kid" href="${c.url}">
      ${c.image?`<img class="kthumb" src="${c.image}" alt="">`:""}
      <span class="kt">${c.title}</span>
      <span class="kd">${c.dates||c.tag||""}</span>
    </a>`).join("");
  return `
  <div class="node">
    <a class="head" href="${p.url}">
      ${p.image?`<img class="thumb" src="${p.image}" alt="">`:""}
      <div><div class="t">${p.title}</div>
      <div class="u">${p.url.replace(/^https?:\/\//,"").replace(/\/$/,"")}</div></div>
    </a>
    ${kids?`<div class="kids">${kids}</div>`:""}
  </div>`;
}
fetch("/site.json",{cache:"no-store"})
  .then(r=>r.json())
  .then(d=>{
    const pages=(d.pages||[]).filter(p=>p.kind!=="apex");
    pages.sort((a,b)=>(a.kind==="sottodominio"?-1:1)-(b.kind==="sottodominio"?-1:1));
    document.getElementById("cols").innerHTML=pages.map(node).join("");
  })
  .catch(()=>{document.getElementById("cols").innerHTML='<p class="loading">Struttura non disponibile offline.</p>';});
</script>
</body>
</html>
