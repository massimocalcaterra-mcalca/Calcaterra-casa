<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mappa · Calcaterra Casa</title>
<meta name="description" content="La struttura del sito calcaterra.casa.">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🗺️</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#FBFAF6; --card:#FFFFFF; --ink:#16202B; --muted:#6A7686; --line:#E4DDD1;
    --shadow:0 8px 24px rgba(22,32,43,.07);
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);
    font-family:Inter,system-ui,-apple-system,sans-serif;-webkit-font-smoothing:antialiased}
  a{color:inherit;text-decoration:none}
  .wrap{max-width:900px;margin:0 auto;padding:34px 22px 80px}
  .back{font-weight:500;font-size:.9rem;color:var(--muted)}
  .back:hover{color:var(--ink)}
  h1{font-family:Fraunces,serif;font-weight:600;font-size:clamp(2.3rem,6vw,3.6rem);margin:44px 0 34px;letter-spacing:-.02em}

  .tree{display:flex;flex-direction:column;align-items:center}
  .root{background:var(--ink);color:#fff;border-radius:16px;padding:14px 26px;font-weight:600;
    font-size:1.05rem;box-shadow:var(--shadow);display:flex;gap:9px;align-items:center}
  .stem{width:2px;height:34px;background:var(--line)}
  .cols{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:18px;width:100%}

  .node{position:relative;background:var(--card);border:1px solid var(--line);border-radius:20px;
    padding:20px;box-shadow:var(--shadow);transition:transform .2s,box-shadow .2s}
  .node:hover{transform:translateY(-4px);box-shadow:0 16px 34px rgba(22,32,43,.13)}
  .node::before{content:"";position:absolute;top:-34px;left:50%;width:2px;height:34px;background:var(--line)}
  .node .head{display:flex;align-items:center;gap:12px}
  .node .chip{width:46px;height:46px;border-radius:13px;display:grid;place-items:center;font-size:1.5rem;flex-shrink:0}
  .node .t{font-family:Fraunces,serif;font-weight:600;font-size:1.35rem}
  .node .u{color:var(--muted);font-size:.82rem;margin-top:1px}
  .kids{margin-top:16px;display:flex;flex-direction:column;gap:9px}
  .kid{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:13px;
    background:var(--bg);font-size:.92rem;font-weight:500;transition:background .18s}
  .kid:hover{background:#F2EEE4}
  .kid .ke{font-size:1.15rem}
  .kid .kt{flex:1}
  .kid .kd{color:var(--muted);font-size:.78rem;font-weight:400}
  .loading{color:var(--muted);text-align:center}
</style>
</head>
<body>
  <div class="wrap">
    <a class="back" href="/">← Home</a>
    <h1>Mappa del sito</h1>
    <div class="tree">
      <div class="root">🏠 calcaterra.casa</div>
      <div class="stem"></div>
      <div class="cols" id="cols"><p class="loading">…</p></div>
    </div>
  </div>

<script>
function tint(hex,a){const n=parseInt(hex.slice(1),16);
  return `rgba(${n>>16},${(n>>8)&255},${n&255},${a})`;}

function node(p){
  const accent=p.accent||"#2563EB";
  const kids=(p.children||[]).map(c=>`
    <a class="kid" href="${c.url}" style="--a:${c.accent||accent}">
      <span class="ke">${c.emoji||"•"}</span>
      <span class="kt">${c.title}</span>
      ${c.dates?`<span class="kd">${c.dates}</span>`:(c.tag?`<span class="kd">${c.tag}</span>`:"")}
    </a>`).join("");
  return `
  <a class="node" href="${p.url}">
    <div class="head">
      <div class="chip" style="background:${tint(accent,.14)};color:${accent}">${p.emoji||"📄"}</div>
      <div><div class="t">${p.title}</div>
      <div class="u">${p.url.replace(/^https?:\/\//,"").replace(/\/$/,"")}</div></div>
    </div>
    ${kids?`<div class="kids">${kids}</div>`:""}
  </a>`;
}

fetch("/site.json",{cache:"no-store"})
  .then(r=>r.json())
  .then(d=>{
    const pages=(d.pages||[]).filter(p=>p.kind!=="apex");
    pages.sort((a,b)=>(a.kind==="sottodominio"?-1:1)-(b.kind==="sottodominio"?-1:1));
    document.getElementById("cols").innerHTML=pages.map(node).join("");
  })
  .catch(()=>{document.getElementById("cols").innerHTML='<p class="loading">Struttura non disponibile offline.</p>';});
</script>
</body>
</html>
