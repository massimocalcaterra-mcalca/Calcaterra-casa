<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 825" width="1200" height="825" role="img" aria-label="Foto">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#06752E"/>
      <stop offset="1" stop-color="#1BAE70"/>
    </linearGradient>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FBFBFA"/>
      <stop offset="1" stop-color="#E7F6EC"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="825" fill="url(#bg)"/>
  <!-- corpo macchina fotografica -->
  <g transform="translate(600 430)">
    <rect x="-300" y="-150" width="600" height="330" rx="34" fill="#0E3D22" opacity="0.55"/>
    <rect x="-320" y="-170" width="600" height="330" rx="34" fill="#FFFFFF"/>
    <rect x="-320" y="-170" width="600" height="80" rx="34" fill="#F0F0EC"/>
    <!-- mirino -->
    <rect x="-250" y="-210" width="150" height="55" rx="14" fill="#FFFFFF"/>
    <!-- obiettivo -->
    <circle cx="-20" cy="5" r="120" fill="#0E3D22"/>
    <circle cx="-20" cy="5" r="96" fill="url(#sky)"/>
    <circle cx="-20" cy="5" r="60" fill="#1BAE70" opacity="0.35"/>
    <circle cx="-52" cy="-27" r="20" fill="#FFFFFF" opacity="0.85"/>
    <!-- flash -->
    <circle cx="205" cy="-115" r="22" fill="#1BAE70"/>
    <rect x="150" y="-30" width="120" height="70" rx="14" fill="#F0F0EC"/>
  </g>
  <text x="600" y="720" text-anchor="middle" font-family="Poppins, sans-serif" font-weight="700"
        font-size="76" fill="#FFFFFF" letter-spacing="-2">Foto</text>
</svg>
