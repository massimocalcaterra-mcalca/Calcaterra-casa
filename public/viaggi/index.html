<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Viaggi · Calcaterra Casa</title>
<meta name="description" content="I viaggi di Massimo Calcaterra.">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🧭</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#FBFAF6; --card:#FFFFFF; --ink:#16202B; --muted:#6A7686; --line:#ECE6DC;
    --shadow:0 10px 30px rgba(22,32,43,.08);
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);
    font-family:Inter,system-ui,-apple-system,sans-serif;-webkit-font-smoothing:antialiased}
  a{color:inherit;text-decoration:none}
  .wrap{max-width:980px;margin:0 auto;padding:34px 22px 70px}
  .back{font-weight:500;font-size:.9rem;color:var(--muted);display:inline-flex;gap:6px;align-items:center}
  .back:hover{color:var(--ink)}

  .hero{margin:50px 0 40px}
  .hero h1{font-family:Fraunces,serif;font-weight:600;font-size:clamp(2.5rem,6.5vw,4.4rem);
    line-height:1.02;margin:0;letter-spacing:-.02em}
  .hero p{color:var(--muted);font-size:1.12rem;margin:.6rem 0 0}

  .trips{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:20px}
  .trip{position:relative;min-height:280px;border-radius:28px;padding:26px;overflow:hidden;color:#fff;
    display:flex;flex-direction:column;justify-content:space-between;box-shadow:var(--shadow);
    transition:transform .22s cubic-bezier(.2,.7,.3,1),box-shadow .22s}
  .trip:hover{transform:translateY(-6px);box-shadow:0 24px 46px rgba(22,32,43,.2)}
  .trip .glow{position:absolute;width:320px;height:320px;border-radius:50%;right:-110px;top:-120px;
    background:rgba(255,255,255,.2)}
  .trip .top{position:relative;z-index:1;display:flex;justify-content:space-between;align-items:flex-start}
  .trip .emoji{font-size:3rem;filter:drop-shadow(0 3px 8px rgba(0,0,0,.2))}
  .trip .pill{background:rgba(255,255,255,.22);border-radius:999px;padding:5px 12px;
    font-size:.8rem;font-weight:600;backdrop-filter:blur(4px)}
  .trip .bottom{position:relative;z-index:1;padding-right:52px}
  .trip h2{font-family:Fraunces,serif;font-weight:600;font-size:2rem;margin:0 0 4px;letter-spacing:-.01em}
  .trip .sub{opacity:.92;font-size:.98rem}
  .trip .arrow{position:absolute;right:24px;bottom:24px;width:44px;height:44px;border-radius:50%;
    background:rgba(255,255,255,.2);display:grid;place-items:center;font-size:1.3rem;transition:.2s}
  .trip:hover .arrow{background:rgba(255,255,255,.34);transform:translateX(3px)}

  .soon{background:var(--card);color:var(--muted);border:2px dashed var(--line);box-shadow:none}
  .soon:hover{transform:none;box-shadow:none}
  .soon .emoji{filter:grayscale(1);opacity:.5}
  .soon h2{color:var(--ink);opacity:.55}
  .soon .arrow{display:none}
  @media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>
  <div class="wrap">
    <a class="back" href="https://calcaterra.casa">← calcaterra.casa</a>

    <header class="hero">
      <h1>Viaggi</h1>
      <p>Atlanti di bordo e itinerari.</p>
    </header>

    <main class="trips">
      <a class="trip" href="/normandie-bretagna"
         style="background:linear-gradient(150deg,#12b5a6,#0a7d75)">
        <div class="glow"></div>
        <div class="top"><span class="emoji">⚓</span><span class="pill">6–14 ago 2026</span></div>
        <div class="bottom">
          <h2>Normandie &amp; Bretagne</h2>
          <div class="sub">Atlante di bordo · 14 tappe</div>
        </div>
        <div class="arrow">→</div>
      </a>

      <a class="trip" href="/bretagna"
         style="background:linear-gradient(150deg,#ff6b4a,#d8432a)">
        <div class="glow"></div>
        <div class="top"><span class="emoji">🏰</span><span class="pill">7 giorni</span></div>
        <div class="bottom">
          <h2>Bretagna</h2>
          <div class="sub">Guida di viaggio</div>
        </div>
        <div class="arrow">→</div>
      </a>
    </main>
  </div>
</body>
</html>
