<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Viaggi · Calcaterra Casa</title>
<meta name="description" content="La libreria dei viaggi di Massimo Calcaterra.">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📖</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&family=Lato:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#FBFBFA; --paper:#FFFFFF; --ink:#14261C; --body:#4B4F58; --muted:#8A8D86;
    --line:#E7E6DF; --green:#1BAE70; --green-d:#06752E;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);
    font-family:Lato,system-ui,sans-serif;-webkit-font-smoothing:antialiased}
  a{color:inherit;text-decoration:none}
  .wrap{max-width:1080px;margin:0 auto;padding:30px 24px 60px}

  .top{display:flex;justify-content:space-between;align-items:center}
  .back{font-size:.82rem;letter-spacing:.03em;color:var(--muted);font-weight:700}
  .back:hover{color:var(--ink)}
  .kicker{font-family:Poppins,sans-serif;font-size:.72rem;font-weight:600;letter-spacing:.24em;
    text-transform:uppercase;color:var(--green-d)}

  .hero{margin:64px 0 8px;text-align:center}
  .hero h1{font-family:Poppins,sans-serif;font-weight:700;font-size:clamp(2.6rem,7vw,4.6rem);
    margin:.15em 0 .1em;letter-spacing:-.02em;line-height:1}
  .hero p{color:var(--body);font-size:1.1rem;margin:0}

  /* --- LIBRERIA --- */
  .shelf{margin-top:70px;position:relative}
  .books{display:flex;flex-wrap:wrap;justify-content:center;align-items:flex-end;gap:56px;
    padding-bottom:26px}
  .plank{height:16px;border-radius:3px;background:linear-gradient(#efe9dd,#e0d7c4);
    box-shadow:0 18px 30px -14px rgba(20,38,28,.5),inset 0 2px 0 rgba(255,255,255,.6);
    margin-top:-9px}

  .book{position:relative;width:min(230px,64vw);aspect-ratio:2/3;perspective:1700px;cursor:pointer;
    display:block;transition:transform .35s cubic-bezier(.2,.7,.3,1)}
  .book:hover{transform:translateY(-12px)}
  .book .stack{position:absolute;inset:0;transform-style:preserve-3d;transition:transform .35s}
  /* pagine interne (dietro la copertina) */
  .book .pages{position:absolute;inset:0;border-radius:4px 8px 8px 4px;background:#FBF7EE;
    box-shadow:inset -10px 0 18px -12px rgba(20,38,28,.35);
    display:flex;flex-direction:column;justify-content:center;align-items:center;padding:24px;text-align:center}
  .book .pages .pk{font-family:Poppins,sans-serif;font-size:.66rem;letter-spacing:.2em;
    text-transform:uppercase;color:var(--green-d);font-weight:600}
  .book .pages .pt{font-family:Poppins,sans-serif;font-weight:600;font-size:1.15rem;color:var(--ink);margin:.4em 0}
  .book .pages .go{margin-top:14px;font-size:.82rem;color:var(--body);border-bottom:1px solid var(--green)}
  /* copertina */
  .book .cover{position:absolute;inset:0;border-radius:4px 9px 9px 4px;overflow:hidden;
    transform-origin:left center;backface-visibility:hidden;
    box-shadow:0 26px 40px -20px rgba(20,38,28,.6), 6px 8px 20px -12px rgba(20,38,28,.4);
    transition:transform .85s cubic-bezier(.62,.04,.24,1)}
  .book .cover img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
  .book .cover .grad{position:absolute;inset:0;
    background:linear-gradient(180deg,rgba(20,38,28,.05) 0%,rgba(20,38,28,.15) 45%,rgba(20,38,28,.82) 100%)}
  .book .cover .spine{position:absolute;left:0;top:0;bottom:0;width:14px;
    background:linear-gradient(90deg,rgba(0,0,0,.38),rgba(0,0,0,0));border-right:1px solid rgba(255,255,255,.12)}
  .book .cover .band{position:absolute;left:0;right:0;bottom:0;padding:18px 16px 20px;color:#fff}
  .book .cover .ck{font-family:Poppins,sans-serif;font-size:.62rem;letter-spacing:.2em;
    text-transform:uppercase;opacity:.85;font-weight:600}
  .book .cover h2{font-family:Poppins,sans-serif;font-weight:600;font-size:1.35rem;
    line-height:1.05;margin:.35em 0 0;letter-spacing:-.01em}
  .book .cover .meta{font-size:.8rem;opacity:.85;margin-top:5px}
  .book .cover .edge{position:absolute;right:0;top:0;bottom:0;width:5px;
    background:repeating-linear-gradient(180deg,#fff,#fff 1px,#e7e0d0 1px,#e7e0d0 3px)}

  /* stato aperto */
  .book.opening{transform:translateY(-12px) scale(1.04);z-index:5}
  .book.opening .cover{transform:rotateY(-158deg)}
  .book.opening .cover .grad,.book.opening .cover .band{opacity:.3}

  #veil{position:fixed;inset:0;background:var(--bg);opacity:0;pointer-events:none;z-index:50;
    transition:opacity .5s ease}
  #veil.on{opacity:1}

  .foot{margin-top:72px;text-align:center;color:var(--muted);font-size:.8rem}
  @media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <a class="back" href="https://calcaterra.casa">← Home</a>
      <span class="kicker">La libreria</span>
    </div>

    <header class="hero">
      <h1>Viaggi</h1>
      <p>Le mie guide, pronte da sfogliare.</p>
    </header>

    <section class="shelf">
      <div class="books">

        <a class="book" href="/normandie-bretagna" data-title="Normandie &amp; Bretagne">
          <div class="stack">
            <div class="pages"><div class="pk">Guida</div><div class="pt">Normandie &amp; Bretagne</div><div class="go">Apri →</div></div>
            <div class="cover">
              <img src="/img/normandie.jpg" alt="Mont-Saint-Michel al tramonto">
              <div class="grad"></div><div class="spine"></div><div class="edge"></div>
              <div class="band">
                <div class="ck">Atlante di bordo</div>
                <h2>Normandie &amp; Bretagne</h2>
                <div class="meta">6–14 agosto 2026 · 14 tappe</div>
              </div>
            </div>
          </div>
        </a>

        <a class="book" href="/bretagna" data-title="Bretagna">
          <div class="stack">
            <div class="pages"><div class="pk">Guida</div><div class="pt">Bretagna</div><div class="go">Apri →</div></div>
            <div class="cover">
              <img src="/img/bretagna.jpg" alt="Porto in Bretagna">
              <div class="grad"></div><div class="spine"></div><div class="edge"></div>
              <div class="band">
                <div class="ck">7 giorni</div>
                <h2>Bretagna</h2>
                <div class="meta">Guida di viaggio</div>
              </div>
            </div>
          </div>
        </a>

      </div>
      <div class="plank"></div>
    </section>

    <div class="foot">Calcaterra Casa</div>
  </div>

  <div id="veil"></div>

<script>
  const reduce = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
  document.querySelectorAll(".book").forEach(book=>{
    book.addEventListener("click",e=>{
      const href = book.getAttribute("href");
      if (reduce){ return; }              // niente animazione: naviga subito
      e.preventDefault();
      if (book.classList.contains("opening")) return;
      book.classList.add("opening");
      setTimeout(()=>document.getElementById("veil").classList.add("on"), 520);
      setTimeout(()=>{ window.location.href = href; }, 980);
    });
  });
</script>
</body>
</html>
