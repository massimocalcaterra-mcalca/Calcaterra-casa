<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calcaterra Casa</title>
<meta name="description" content="Il sito personale di Massimo Calcaterra — viaggi e appunti.">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏠</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&family=Lato:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#FBFBFA; --paper:#FFFFFF; --ink:#14261C; --body:#4B4F58; --muted:#8A8D86;
    --line:#E7E6DF; --green:#1BAE70; --green-d:#06752E;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);
    font-family:Lato,system-ui,sans-serif;-webkit-font-smoothing:antialiased}
  a{color:inherit;text-decoration:none}
  .wrap{max-width:1080px;margin:0 auto;padding:30px 24px 70px}

  .nav{display:flex;justify-content:space-between;align-items:center}
  .name{font-family:Poppins,sans-serif;font-weight:600;font-size:1rem;letter-spacing:-.01em}
  .name .dot{color:var(--green)}
  .nav .tag{font-size:.78rem;color:var(--muted);letter-spacing:.02em}

  .hero{margin:76px 0 60px;max-width:16ch}
  .kicker{font-family:Poppins,sans-serif;font-size:.72rem;font-weight:600;letter-spacing:.24em;
    text-transform:uppercase;color:var(--green-d)}
  .hero h1{font-family:Poppins,sans-serif;font-weight:700;font-size:clamp(2.8rem,8vw,5.4rem);
    line-height:1;letter-spacing:-.03em;margin:.24em 0 0}
  .hero h1 .g{color:var(--green)}

  .feats{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:22px}
  .feat{position:relative;display:block;border-radius:16px;overflow:hidden;aspect-ratio:16/11;
    box-shadow:0 14px 34px -18px rgba(20,38,28,.5);transition:transform .3s cubic-bezier(.2,.7,.3,1)}
  .feat:hover{transform:translateY(-6px)}
  .feat img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;
    transition:transform .5s cubic-bezier(.2,.7,.3,1)}
  .feat:hover img{transform:scale(1.05)}
  .feat .veil{position:absolute;inset:0;
    background:linear-gradient(180deg,rgba(20,38,28,.08),rgba(20,38,28,.72))}
  .feat .cap{position:absolute;left:0;right:0;bottom:0;padding:22px 24px;color:#fff;
    display:flex;justify-content:space-between;align-items:flex-end;gap:12px}
  .feat .ck{font-family:Poppins,sans-serif;font-size:.66rem;font-weight:600;letter-spacing:.2em;
    text-transform:uppercase;opacity:.85}
  .feat h2{font-family:Poppins,sans-serif;font-weight:600;font-size:1.75rem;margin:.15em 0 0;letter-spacing:-.01em}
  .feat .arrow{width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,.16);
    border:1px solid rgba(255,255,255,.3);display:grid;place-items:center;font-size:1.2rem;flex-shrink:0;
    transition:background .25s,transform .25s}
  .feat:hover .arrow{background:var(--green);border-color:var(--green);transform:translateX(3px)}

  .foot{margin-top:56px;color:var(--muted);font-size:.8rem}
  @media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>
  <div class="wrap">
    <nav class="nav">
      <span class="name">Massimo Calcaterra<span class="dot">.</span></span>
      <span class="tag">viaggi &amp; appunti</span>
    </nav>

    <header class="hero">
      <div class="kicker">Calcaterra Casa</div>
      <h1>Ciao, sono <span class="g">Massimo</span>.</h1>
    </header>

    <main class="feats" id="feats"></main>

    <div class="foot">© 2026</div>
  </div>

<script>
function feat(p){
  const img=p.image || "/img/viaggi.jpg";
  const ck=p.kind==="sottodominio" ? "Sezione" : "Pagina";
  return `
  <a class="feat" href="${p.url}">
    <img src="${img}" alt="${p.title}" loading="lazy">
    <div class="veil"></div>
    <div class="cap">
      <div><div class="ck">${ck}</div><h2>${p.title}</h2></div>
      <div class="arrow">→</div>
    </div>
  </a>`;
}
fetch("/site.json",{cache:"no-store"})
  .then(r=>r.json())
  .then(d=>{
    const pages=(d.pages||[]).filter(p=>p.kind!=="apex");
    pages.sort((a,b)=>(a.kind==="sottodominio"?-1:1)-(b.kind==="sottodominio"?-1:1));
    document.getElementById("feats").innerHTML=pages.map(feat).join("");
  })
  .catch(()=>{document.getElementById("feats").innerHTML=
    '<a class="feat" href="https://viaggi.calcaterra.casa"><img src="/img/viaggi.jpg" alt="Viaggi"><div class="veil"></div><div class="cap"><div><div class="ck">Sezione</div><h2>Viaggi</h2></div><div class="arrow">→</div></div></a>';});
</script>
</body>
</html>
